<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofi — Tracker Personal</title>
<style>
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE6; --border: #E2DDD6;
  --text: #1A1A18; --text2: #6B6860; --text3: #A8A49E;
  --teal: #1D9E75; --teal-bg: #E1F5EE; --teal-text: #0A5C44;
  --purple: #6B5FD4; --purple-bg: #EEEDFE; --purple-text: #3C3489;
  --amber: #C97B1A; --amber-bg: #FEF3DC; --amber-text: #7A4A0A;
  --coral: #C94A2A; --coral-bg: #FAECE7; --coral-text: #7A2A10;
  --blue: #1A6FB4; --blue-bg: #E3F0FA; --blue-text: #0D3F6E;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); }
.nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; position: sticky; top: 61px; z-index: 99; }
.nav::-webkit-scrollbar { display: none; }
.nav-tab { flex: 1; min-width: 70px; padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
.nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
.nav-tab-icon { font-size: 15px; display: block; margin-bottom: 2px; }
.panel { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
.panel.active { display: block; }
.day-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; background: var(--surface); border-radius: var(--radius); padding: 10px 14px; border: 1px solid var(--border); }
.day-nav-btn { background: var(--surface2); border: none; border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; color: var(--text); font-size: 16px; }
.day-nav-label { flex: 1; text-align: center; }
.day-nav-main { font-size: 15px; font-weight: 600; }
.day-nav-tipo { font-size: 11px; margin-top: 1px; }
.macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.macro-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 8px; text-align: center; }
.macro-val { font-size: 20px; font-weight: 700; line-height: 1; }
.macro-unit { font-size: 10px; color: var(--text3); margin-top: 2px; }
.macro-obj { font-size: 10px; color: var(--text3); margin-top: 1px; }
.macro-card.over .macro-val { color: var(--coral); }
.macro-card.perfect .macro-val { color: var(--teal); }
.macro-card.low .macro-val { color: var(--amber); }
.bars-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 12px; }
.bar-row { margin-bottom: 10px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.bar-track { background: var(--surface2); border-radius: 4px; height: 7px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.bar-teal { background: var(--teal); } .bar-amber { background: var(--amber); }
.bar-coral { background: var(--coral); } .bar-purple { background: var(--purple); }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin: 16px 0 8px; }
.meal-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; }
.meal-time { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text3); }
.meal-name { font-size: 14px; font-weight: 500; margin: 3px 0; }
.meal-macros { font-size: 12px; color: var(--text2); }
.meal-macros span { margin-right: 8px; }
.wellbeing-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
.wb-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; }
.wb-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.stars { font-size: 18px; letter-spacing: 2px; color: var(--amber); }
.ex-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
.ex-num { background: var(--purple-bg); color: var(--purple-text); font-size: 12px; font-weight: 700; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.ex-name { font-size: 14px; font-weight: 500; }
.ex-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
.ex-peso { display: inline-block; font-size: 11px; font-weight: 600; color: var(--teal-text); background: var(--teal-bg); padding: 2px 7px; border-radius: 20px; margin-top: 4px; }
.ex-prev { display: inline-block; font-size: 11px; color: var(--text3); margin-left: 6px; margin-top: 4px; }
.feeling-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }
.feeling-great { background: var(--teal-bg); color: var(--teal-text); }
.feeling-ok { background: var(--amber-bg); color: var(--amber-text); }
.feeling-hard { background: var(--coral-bg); color: var(--coral-text); }
.transit-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
.transit-icon { font-size: 24px; }
.transit-date { font-size: 14px; font-weight: 600; }
.transit-time { font-size: 13px; color: var(--text2); margin-top: 2px; }
.transit-badge { margin-left: auto; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.badge-ok { background: var(--teal-bg); color: var(--teal-text); }
.badge-no { background: var(--coral-bg); color: var(--coral-text); }
.chart-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 12px; }
.chart-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.chart-subtitle { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
.chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
.chart-bar { width: 100%; border-radius: 4px 4px 0 0; transition: height .4s; min-height: 2px; }
.chart-day-label { font-size: 10px; color: var(--text3); }
.chart-val { font-size: 10px; color: var(--text2); }
.line-chart { position: relative; height: 80px; margin-top: 8px; }
.line-chart svg { width: 100%; height: 100%; }
.weekly-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.weekly-table th { padding: 6px 4px; color: var(--text3); font-weight: 500; text-align: center; font-size: 11px; }
.weekly-table td { padding: 6px 4px; text-align: center; }
.weekly-table tr { border-bottom: 1px solid var(--border); }
.weekly-table tr:last-child { border-bottom: none; }
.w-lbl { text-align: left !important; font-weight: 500; color: var(--text2); }
.w-dot { display: inline-block; padding: 2px 5px; border-radius: 5px; font-weight: 600; font-size: 11px; min-width: 36px; }
.w-ok { background: var(--teal-bg); color: var(--teal-text); }
.w-over { background: var(--coral-bg); color: var(--coral-text); }
.w-low { background: var(--amber-bg); color: var(--amber-text); }
.w-empty { background: var(--surface2); color: var(--text3); }
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
.card-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.summary-row:last-child { border-bottom: none; }
.tipo-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; }
.tipo-gym { background: var(--purple-bg); color: var(--purple-text); }
.tipo-yoga { background: var(--teal-bg); color: var(--teal-text); }
.tipo-descanso { background: var(--surface2); color: var(--text2); }
.insight-card { border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
.insight-ok { background: var(--teal-bg); border-left: 3px solid var(--teal); }
.insight-warn { background: var(--amber-bg); border-left: 3px solid var(--amber); }
.insight-alert { background: var(--coral-bg); border-left: 3px solid var(--coral); }
.insight-info { background: var(--blue-bg); border-left: 3px solid var(--blue); }
.insight-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.insight-body { font-size: 12px; line-height: 1.5; color: var(--text2); }
.hashi-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; }
.hashi-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.hashi-row:last-child { border-bottom: none; }
.pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.pill-ok { background: var(--teal-bg); color: var(--teal-text); }
.pill-no { background: var(--coral-bg); color: var(--coral-text); }
.pill-mid { background: var(--amber-bg); color: var(--amber-text); }
.racha-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.racha-box { border-radius: var(--radius); padding: 14px; text-align: center; }
.racha-box-prot { background: var(--purple-bg); }
.racha-box-levo { background: var(--teal-bg); }
.racha-num { font-size: 32px; font-weight: 700; line-height: 1; }
.racha-num-prot { color: var(--purple-text); }
.racha-num-levo { color: var(--teal-text); }
.racha-label { font-size: 11px; margin-top: 4px; }
.racha-label-prot { color: var(--purple-text); }
.racha-label-levo { color: var(--teal-text); }
.score-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; }
.score-num { font-size: 40px; font-weight: 700; color: var(--teal); line-height: 1; min-width: 60px; text-align: center; }
.score-detail { flex: 1; font-size: 12px; color: var(--text2); line-height: 1.7; }
.score-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.muscle-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.muscle-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--purple-bg); color: var(--purple-text); font-weight: 500; }
.muscle-pill.done { background: var(--teal-bg); color: var(--teal-text); }
.prog-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; }
.prog-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.prog-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
.prog-date { color: var(--text3); min-width: 36px; }
.prog-peso { font-weight: 600; color: var(--text); min-width: 60px; }
.prog-trend { font-size: 14px; }
.empty { text-align: center; color: var(--text3); font-size: 13px; padding: 32px 0; }
/* ── PROGRESIÓN ── */
.prog-rutina-header { display: flex; align-items: center; gap: 8px; margin: 20px 0 10px; }
.prog-rutina-icon { font-size: 20px; }
.prog-rutina-title { font-size: 15px; font-weight: 700; color: var(--text); }
.prog-rutina-count { font-size: 11px; color: var(--text3); margin-left: auto; }
.prog2-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 8px; }
.prog2-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; display: flex; align-items: flex-start; gap: 6px; }
.prog2-pausa { font-size: 10px; font-weight: 600; color: var(--coral-text); background: var(--coral-bg); padding: 1px 6px; border-radius: 10px; margin-left: 4px; flex-shrink: 0; margin-top: 2px; }
.prog2-sesiones { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.prog2-chip { display: flex; flex-direction: column; align-items: center; gap: 2px; background: var(--surface2); border-radius: 8px; padding: 6px 10px; min-width: 52px; }
.prog2-chip-fecha { font-size: 10px; color: var(--text3); }
.prog2-chip-peso { font-size: 12px; font-weight: 700; color: var(--text); }
.prog2-chip-reps { font-size: 10px; color: var(--text2); }
.prog2-chip.latest { background: var(--purple-bg); border: 1px solid var(--purple); }
.prog2-chip.latest .prog2-chip-peso { color: var(--purple-text); }
.prog2-chip.up { background: var(--teal-bg); border: 1px solid var(--teal); }
.prog2-chip.up .prog2-chip-peso { color: var(--teal-text); }
.prog2-trend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); margin-top: 4px; }
.prog2-trend-arrow { font-size: 13px; }
.prog2-nodata { font-size: 11px; color: var(--text3); font-style: italic; padding: 4px 0; }
.prog2-svg-wrap { margin: 6px 0 2px; }
.prog-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.prog-filter-btn { font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .15s; }
.prog-filter-btn.active { background: var(--purple-bg); border-color: var(--purple); color: var(--purple-text); }
@media (max-width: 380px) {
  .macro-val { font-size: 16px; }
  .macro-grid { gap: 5px; }
  .wellbeing-grid { grid-template-columns: 1fr; }
  .racha-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">Tracker de Sofi</div>
    <div class="header-sub">1.65m · 57kg · Definición · Hashimoto</div>
  </div>
  <div class="header-dot"></div>
</div>
<div class="nav">
  <div class="nav-tab active" onclick="switchTab('nutricion',this)"><span class="nav-tab-icon">🥗</span>Nutrición</div>
  <div class="nav-tab" onclick="switchTab('entreno',this)"><span class="nav-tab-icon">💪</span>Entreno</div>
  <div class="nav-tab" onclick="switchTab('bienestar',this)"><span class="nav-tab-icon">🌿</span>Bienestar</div>
  <div class="nav-tab" onclick="switchTab('semana',this)"><span class="nav-tab-icon">📊</span>Resumen</div>
  <div class="nav-tab" onclick="switchTab('progresion',this)"><span class="nav-tab-icon">📈</span>Progresión</div>
</div>

<!-- NUTRICIÓN -->
<div class="panel active" id="panel-nutricion">
  <div class="day-nav">
    <button class="day-nav-btn" onclick="changeDay(-1)">‹</button>
    <div class="day-nav-label">
      <div class="day-nav-main" id="dn-label">—</div>
      <div class="day-nav-tipo" id="dn-tipo"></div>
    </div>
    <button class="day-nav-btn" onclick="changeDay(1)">›</button>
  </div>
  <div id="score-day"></div>
  <div class="macro-grid" id="macro-grid"></div>
  <div class="bars-card" id="bars"></div>
  <div id="insights-nutricion"></div>
  <div class="section-label">Comidas del día</div>
  <div id="meals-list"></div>
</div>

<!-- ENTRENO -->
<div class="panel" id="panel-entreno">
  <div class="day-nav">
    <button class="day-nav-btn" onclick="changeDayE(-1)">‹</button>
    <div class="day-nav-label">
      <div class="day-nav-main" id="dn-label-e">—</div>
    </div>
    <button class="day-nav-btn" onclick="changeDayE(1)">›</button>
  </div>
  <div id="entreno-content"></div>
</div>

<!-- BIENESTAR -->
<div class="panel" id="panel-bienestar">
  <div class="day-nav">
    <button class="day-nav-btn" onclick="changeDayB(-1)">‹</button>
    <div class="day-nav-label">
      <div class="day-nav-main" id="dn-label-b">—</div>
    </div>
    <button class="day-nav-btn" onclick="changeDayB(1)">›</button>
  </div>
  <div id="bienestar-content"></div>
</div>

<!-- RESUMEN -->
<div class="panel" id="panel-semana">
  <div class="racha-grid" id="racha-grid"></div>

  <!-- Selector período -->
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="prog-filter-btn active" id="btn-periodo-todo" onclick="setPeriodo('todo')">📋 Todo</button>
      <button class="prog-filter-btn" id="btn-periodo-mes" onclick="setPeriodo('mes')">🗓 Mes</button>
      <button class="prog-filter-btn" id="btn-periodo-semana" onclick="setPeriodo('semana')">📅 Semana</button>
    </div>
    <div id="selector-mes" style="display:none">
      <select id="select-mes" onchange="renderSemana()" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px"></select>
    </div>
    <div id="selector-fechas" style="display:none;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;flex-direction:column;gap:4px;flex:1">
        <label style="font-size:11px;color:var(--text3)">Desde</label>
        <input type="date" id="fecha-desde" onchange="renderSemana()" style="padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;width:100%">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex:1">
        <label style="font-size:11px;color:var(--text3)">Hasta</label>
        <input type="date" id="fecha-hasta" onchange="renderSemana()" style="padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;width:100%">
      </div>
    </div>
  </div>

  <div class="section-label">Macros vs objetivo</div>
  <div class="card" style="overflow-x:auto"><table class="weekly-table" id="weekly-table"></table></div>

  <div class="section-label">Músculos trabajados</div>
  <div class="card" id="musculos-semana"></div>

  <div class="section-label">Entrenamiento</div>
  <div class="card" id="weekly-entreno"></div>

  <div id="progresion-pesos"></div>

  <div class="section-label">Tendencia de bienestar</div>
  <div id="wellbeing-trend-chart"></div>

  <div class="section-label">Bienestar por día</div>
  <div class="card" id="weekly-bienestar"></div>
</div>

<!-- PROGRESIÓN -->
<div class="panel" id="panel-progresion">
  <div class="prog-filter" id="prog-filter"></div>
  <div id="progresion-content"></div>
</div>

<script>
const GOALS = { kcal: 1750, prot: 105, carbs: 170, fat: 50 };
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const DATA = {
  nutricion: {

      tipo: 'descanso',
      totals: { kcal: 1750, prot: 73, carbs: 171, fat: 58 },

        { time: 'Snack', name: '½ torta vasca de dulce de leche', kcal: 350, prot: 5, carbs: 42, fat: 18 },
        { time: 'Cena', name: 'Omelette (2 huevos + 1 clara + acelga + queso cremoso) + calabaza hervida', kcal: 340, prot: 23, carbs: 14, fat: 12 },
        { time: 'Extra', name: '3 mandarinas', kcal: 90, prot: 1, carbs: 22, fat: 0 },
      ]
    },
    '2026-06-22': {
      tipo: 'gym',
      totals: { kcal: 1660, prot: 112, carbs: 90, fat: 62 },
      meals: [
        { time: 'Desayuno', name: '2 huevos + ghee + 4 tomates cherry + 2 galletas de arroz', kcal: 280, prot: 14, carbs: 18, fat: 14 },
        { time: 'Almuerzo', name: '1/6 tarta casera (pollo 690g + 5 huevos + acelga + calabaza)', kcal: 320, prot: 28, carbs: 12, fat: 12 },
        { time: 'Merienda', name: 'Yogur dahi + proteína en polvo + banana + mantequilla de maní + frutos secos', kcal: 480, prot: 38, carbs: 32, fat: 18 },
        { time: 'Cena', name: 'Tarta casera + ensalada palta + batata hervida', kcal: 580, prot: 32, carbs: 28, fat: 18 },

function goalFor(tipo,macro){const g={...GOALS};if(tipo==='yoga')g.kcal=1700;if(tipo==='descanso')g.kcal=1600;return g[macro];}
function pct(val,goal){return Math.min(100,Math.round(val/goal*100));}
function stars(n,max=5){return'<span style="color:var(--amber)">'+'★'.repeat(n)+'</span><span style="color:var(--border)">'+'★'.repeat(max-n)+'</span>';}
function macroStatus(val,goal){const p=val/goal;return p>1.1?'over':p>0.88?'perfect':'low';}

function dayScore(data){
  let s=0, max=0;
  const t=data.totals;
  const goals={kcal:goalFor(data.tipo,'kcal'),prot:goalFor(data.tipo,'prot'),carbs:goalFor(data.tipo,'carbs'),fat:goalFor(data.tipo,'fat')};
  // proteína (3pts)
  max+=3; if(t.prot>=goals.prot*0.95)s+=3; else if(t.prot>=goals.prot*0.80)s+=2; else if(t.prot>=goals.prot*0.65)s+=1;
  // calorías (2pts) — déficit moderado cuenta como éxito para definición
  max+=2; const kp=t.kcal/goals.kcal; if(kp>=0.80&&kp<=1.1)s+=2; else if(kp>=0.70&&kp<=1.2)s+=1;
  // grasas (1pt)
  max+=1; if(t.fat<=goals.fat*1.1)s+=1;
  // carbos (1pt)
  max+=1; if(t.carbs<=goals.carbs*1.1)s+=1;
  // tránsito (1pt)
  max+=1; const tDay=DATA.transito.find(tr=>tr.fecha===DAYS_ORDER[idxN]); if(tDay&&tDay.hora)s+=1;
  // bienestar (2pts)
  const b=DATA.bienestar[DAYS_ORDER[idxN]];
  max+=2;
  if(b){
    if(b.levotiroxina)s+=1;
    if(b.energia>=4&&b.sueno>=4)s+=1;
  }
  return Math.round(s/max*10);
}

function scoreColor(s){return s>=8?'var(--teal)':s>=6?'var(--amber)':'var(--coral)';}
function scoreLabel(s){return s>=8?'Día excelente':s>=6?'Día aceptable':'Día a mejorar';}

function generateInsights(data){
  const t=data.totals,ins=[];
  const goals={kcal:goalFor(data.tipo,'kcal'),prot:goalFor(data.tipo,'prot'),carbs:goalFor(data.tipo,'carbs'),fat:goalFor(data.tipo,'fat')};
  if(t.prot>=goals.prot*0.95)ins.push({type:'ok',icon:'💪',title:'Proteína alcanzada',body:`${t.prot}g — objetivo cumplido. Recuperación muscular asegurada.`});
  else if(t.prot<goals.prot*0.80)ins.push({type:'alert',icon:'⚠️',title:'Proteína baja',body:`Solo ${t.prot}g de ${goals.prot}g objetivo.`});
  if(t.kcal>goals.kcal*1.15)ins.push({type:'warn',icon:'🔥',title:'Calorías por encima',body:`${t.kcal} kcal vs objetivo de ${goals.kcal}. Sin drama — retomá mañana.`});
  else if(t.kcal<goals.kcal*0.80)ins.push({type:'warn',icon:'📉',title:'Calorías muy bajas',body:`${t.kcal} kcal. Déficit muy grande — puede afectar la recuperación.`});
  else if(t.kcal<goals.kcal*0.95)ins.push({type:'ok',icon:'✅',title:'Déficit moderado',body:`${t.kcal} kcal — por debajo del objetivo. Bien para definición.`});
  if(t.fat>goals.fat*1.2)ins.push({type:'warn',icon:'🥑',title:'Grasas elevadas',body:`${t.fat}g. Probablemente de buenas fuentes.`});
  if(data.tipo==='gym'&&t.carbs<80)ins.push({type:'warn',icon:'🍠',title:'Carbos bajos para gym',body:'Sumá batata, arroz o fruta en el próximo día de gym.'});
  const b=DATA.bienestar[DAYS_ORDER[idxN]];
  if(b&&!b.levotiroxina)ins.push({type:'alert',icon:'💊',title:'Levotiroxina no registrada',body:'Recordá tomarla en ayunas, mínimo 30 min antes de comer.'});
  return ins;
}

let periodoActual='todo';

function setPeriodo(p){
  periodoActual=p;
  document.querySelectorAll('#btn-periodo-todo,#btn-periodo-mes,#btn-periodo-semana').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-periodo-'+p).classList.add('active');
  document.getElementById('selector-mes').style.display=p==='mes'?'block':'none';
  document.getElementById('selector-fechas').style.display=p==='semana'?'flex':'none';
  renderSemana();
}

function getDiasEnPeriodo(){
  const allDays=DAYS_ORDER;
  if(periodoActual==='todo') return allDays;
  if(periodoActual==='mes'){
    const sel=document.getElementById('select-mes');
    if(!sel||!sel.value) return allDays;
    return allDays.filter(d=>d.startsWith(sel.value));
  }
  if(periodoActual==='semana'){
    const desde=document.getElementById('fecha-desde')?.value;
    const hasta=document.getElementById('fecha-hasta')?.value;
    if(!desde||!hasta) return allDays;
    return allDays.filter(d=>d>=desde&&d<=hasta);
  }
  return allDays;
}

function renderSemana(){
  // Llenar selector de meses
  const meses=[...new Set(DAYS_ORDER.map(d=>d.substring(0,7)))].sort();
  const selMes=document.getElementById('select-mes');
  if(selMes&&selMes.options.length===0){
    meses.forEach(m=>{const opt=document.createElement('option');opt.value=m;const [y,mo]=m.split('-');const names=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];opt.textContent=names[parseInt(mo)]+' '+y;selMes.appendChild(opt);});
    selMes.value=meses[meses.length-1];
  }

  const dias=getDiasEnPeriodo();

  // Rachas (siempre sobre todos los datos)
  let rachaProt=0,rachaLevo=0,rachaTrans=0;
  for(let i=DAYS_ORDER.length-1;i>=0;i--){const d=DAYS_ORDER[i],dd=DATA.nutricion[d];if(dd&&dd.totals.prot>=goalFor(dd.tipo,'prot')*0.90)rachaProt++;else break;}
  const levoKeys=Object.keys(DATA.bienestar).sort();
  for(let i=levoKeys.length-1;i>=0;i--){const b=DATA.bienestar[levoKeys[i]];if(b&&b.levotiroxina)rachaLevo++;else break;}
  const transKeys=DAYS_ORDER.slice().reverse();
  for(const d of transKeys){const t=DATA.transito.find(tr=>tr.fecha===d);if(t&&t.hora)rachaTrans++;else break;}
  document.getElementById('racha-grid').innerHTML=`
    <div class="racha-box racha-box-prot"><div class="racha-num racha-num-prot">${rachaProt}</div><div class="racha-label racha-label-prot">días seguidos proteína ≥90% 💪</div></div>

    <div class="racha-box racha-box-prot" style="background:var(--teal-bg)"><div class="racha-num racha-num-prot" style="color:var(--teal-text)">${rachaTrans}</div><div class="racha-label racha-label-prot" style="color:var(--teal-text)">días seguidos tránsito 🚽</div></div>`;

  // Tabla macros del período
  const macroKeys=[{key:'kcal',lbl:'Kcal',unit:''},{key:'prot',lbl:'Prot',unit:'g'},{key:'carbs',lbl:'Carbos',unit:'g'},{key:'fat',lbl:'Grasas',unit:'g'}];
  const th='<tr><th class="w-lbl">Macro</th>'+dias.map(d=>`<th>${dateLabel(d).split(' ')[0]}<br><span style="font-weight:400;color:var(--text3)">${dateLabel(d).split(' ')[1]}</span></th>`).join('')+'<th style="color:var(--teal)">Prom.</th></tr>';
  const rows=macroKeys.map(m=>{
    const vals=dias.map(d=>DATA.nutricion[d]?.totals[m.key]).filter(v=>v!=null);
    const avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
    const avgGoal=m.key==='kcal'?GOALS.kcal:GOALS[m.key];
    const avgCls=avg==null?'w-empty':avg/avgGoal>1.1?'w-over':avg/avgGoal>0.88?'w-ok':'w-low';
    const cells=dias.map(d=>{const dd=DATA.nutricion[d];if(!dd)return'<td><span class="w-dot w-empty">—</span></td>';const val=dd.totals[m.key],goal=goalFor(dd.tipo,m.key),p=val/goal,cls=p>1.1?'w-over':p>0.88?'w-ok':'w-low';return`<td><span class="w-dot ${cls}">${val}${m.unit}</span></td>`;}).join('');
    return`<tr><td class="w-lbl">${m.lbl}</td>${cells}<td><span class="w-dot ${avgCls}" style="font-weight:700">${avg!=null?avg+m.unit:'—'}</span></td></tr>`;
  }).join('');
  document.getElementById('weekly-table').innerHTML=th+rows;

    <span style="font-size:18px;color:var(--purple-text)">›</span>
  </div>`;

  // Tendencia bienestar del período
  const bDias=dias.filter(d=>DATA.bienestar[d]);
  if(bDias.length>=2){

        <polyline points="${points('sueno')}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round"/>
        <polyline points="${points('animo')}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linejoin="round"/>

  } else { document.getElementById('wellbeing-trend-chart').innerHTML=''; }

  // Bienestar por día con promedios

  const promRow=`<div class="summary-row" style="background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:4px">
    <span style="font-weight:600;font-size:12px">Promedio período</span>
    <span style="font-size:12px">⚡${promedios.energia||'—'} 😴${promedios.sueno||'—'} 😊${promedios.animo||'—'} 💧${promedios.hinchazon||'—'}</span>
  </div>`;
  document.getElementById('weekly-bienestar').innerHTML=promRow+bDias.map(d=>{const b=DATA.bienestar[d];return`<div class="summary-row"><span>${dateLabel(d)}</span><span style="font-size:12px">⚡${b.energia} 😴${b.sueno} 😊${b.animo} 💧${b.hinchazon}</span><span class="pill ${b.levotiroxina?'pill-ok':'pill-no'}" style="font-size:10px">${b.levotiroxina?'💊 ✓':'💊 ✗'}</span></div>`;}).join('')||'<div class="empty">Sin datos</div>';
}

function normalizarNombre(raw) {
  return raw
    .replace(/\s*\([A-Z]\d+\)/g, '')   // quita (A1), (B2), etc.
    .replace(/\s*⚠️.*$/g, '')           // quita advertencias
    .replace(/\s*EN PAUSA.*/gi, '')
    .replace(/\s*NO COMPLETADO.*/gi, '')
    .trim();
}

// Busca el ejercicio canónico más cercano para un nombre dado
function matchEjercicioCanónico(nombre, listaCanónica) {
  const n = normalizarNombre(nombre).toLowerCase();
  // Match exacto
  const exacto = listaCanónica.find(c => c.toLowerCase() === n);
  if (exacto) return exacto;
  // Match parcial (≥2 palabras en común)
  for (const c of listaCanónica) {
    const palabrasC = c.toLowerCase().split(/\s+/).filter(w => w.length > 3);
    const palabrasN = n.split(/\s+/).filter(w => w.length > 3);
    const comunes = palabrasC.filter(w => palabrasN.includes(w));
    if (comunes.length >= 2) return c;
  }
  return null;
}

let progFiltroActual = 'Todos';

function renderProgresion() {
  // Construir mapa: rutina → ejercicio_canónico → [{fecha, peso, pesoKg, detalle, pausa, incompleto}]
  const historial = {}; // { 'Glúteos': { 'Hip thrust con barra': [...] } }
  Object.keys(RUTINAS_PLAN).forEach(r => { historial[r] = {}; });

  ENTRENO_DAYS.forEach(fecha => {
    const sesion = DATA.entreno[fecha];
    const rutina = sesion.tipo; // 'Glúteos', 'Piernas', etc.
    if (!historial[rutina]) return;
    const listaCanónica = RUTINAS_PLAN[rutina]?.ejercicios || [];

    sesion.ejercicios.forEach(ex => {
      const canon = matchEjercicioCanónico(ex.name, listaCanónica);
      if (!canon) return; // calentamientos genéricos, etc.
      if (!historial[rutina][canon]) historial[rutina][canon] = [];
      historial[rutina][canon].push({
        fecha, peso: ex.peso, pesoKg: ex.pesoKg ?? null,
        detalle: ex.detalle, pausa: ex.pausa || false, incompleto: ex.incompleto || false
      });
    });
  });

  // Filtros
  const rutinas = Object.keys(RUTINAS_PLAN);
  const filtros = ['Todos', ...rutinas];
  document.getElementById('prog-filter').innerHTML = filtros.map(f =>
    `<button class="prog-filter-btn ${f === progFiltroActual ? 'active' : ''}" onclick="setProgFiltro('${f}')">${f === 'Todos' ? '📋 Todos' : RUTINAS_PLAN[f].icon + ' ' + f}</button>`
  ).join('');

  // Render
  const rutinasMostrar = progFiltroActual === 'Todos' ? rutinas : [progFiltroActual];
  let html = '';

  rutinasMostrar.forEach(rutina => {
    const plan = RUTINAS_PLAN[rutina];
    const ejsConDatos = Object.keys(historial[rutina] || {});
    const totalSesiones = ENTRENO_DAYS.filter(d => DATA.entreno[d]?.tipo === rutina).length;

    html += `<div class="prog-rutina-header">
      <span class="prog-rutina-icon">${plan.icon}</span>
      <span class="prog-rutina-title">${rutina}</span>
      <span class="prog-rutina-count">${totalSesiones} sesión${totalSesiones !== 1 ? 'es' : ''} registrada${totalSesiones !== 1 ? 's' : ''}</span>
    </div>`;

    // Todos los ejercicios del plan para esta rutina
    plan.ejercicios.forEach(ejCanon => {
      const registros = (historial[rutina][ejCanon] || []).sort((a,b) => a.fecha.localeCompare(b.fecha));
      const hayDatos = registros.length > 0;
      const esPausa = registros.some(r => r.pausa);

      html += `<div class="prog2-card">
        <div class="prog2-name">
          ${ejCanon}
          ${esPausa ? '<span class="prog2-pausa">EN PAUSA</span>' : ''}
        </div>`;

      if (!hayDatos) {
        html += `<div class="prog2-nodata">Sin registros aún</div>`;
      } else {
        // Chips de sesión
        html += `<div class="prog2-sesiones">`;
        registros.forEach((r, i) => {
          const esUltimo = i === registros.length - 1;
          const anterior = i > 0 ? registros[i-1] : null;
          const subio = anterior && r.pesoKg !== null && anterior.pesoKg !== null && r.pesoKg > anterior.pesoKg;
          let chipClass = esUltimo ? 'latest' : '';
          if (subio) chipClass = 'up';

          const fechaCorta = dateLabel(r.fecha).replace(' ', '\n');
          const pesoDisplay = r.incompleto ? `⚠️ ${r.peso === '—' ? 'n/c' : r.peso}` : (r.peso === '—' || r.peso === 'sin peso' ? 'sin carga' : r.peso);

          html += `<div class="prog2-chip ${chipClass}" title="${r.detalle}">
            <span class="prog2-chip-fecha">${dateLabel(r.fecha).split(' ')[0]}<br>${dateLabel(r.fecha).split(' ')[1]}</span>
            <span class="prog2-chip-peso">${pesoDisplay}</span>
            <span class="prog2-chip-reps">${r.detalle.split('—')[0].trim().substring(0,12)}</span>
          </div>`;
        });
        html += `</div>`;

        // Mini gráfico de línea SVG si hay ≥2 datos numéricos
        const conPeso = registros.filter(r => r.pesoKg !== null && r.pesoKg > 0);
        if (conPeso.length >= 2) {
          const minK = Math.min(...conPeso.map(r => r.pesoKg));
          const maxK = Math.max(...conPeso.map(r => r.pesoKg));
          const W = 260, H = 40, padX = 10, padY = 6;
          const xOf = (i) => padX + (i / (conPeso.length - 1)) * (W - 2 * padX);
          const yOf = (v) => {
            if (maxK === minK) return H / 2;
            return (H - padY) - ((v - minK) / (maxK - minK)) * (H - 2 * padY);
          };
          const pts = conPeso.map((r, i) => `${xOf(i)},${yOf(r.pesoKg)}`).join(' ');
          const ultimo = conPeso[conPeso.length - 1];
          const penultimo = conPeso[conPeso.length - 2];
          const lineColor = ultimo.pesoKg > penultimo.pesoKg ? 'var(--teal)' : ultimo.pesoKg < penultimo.pesoKg ? 'var(--coral)' : 'var(--text3)';

          html += `<div class="prog2-svg-wrap">
            <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:44px;overflow:visible">
              <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
              ${conPeso.map((r, i) => `<circle cx="${xOf(i)}" cy="${yOf(r.pesoKg)}" r="3" fill="${lineColor}"/>
                <text x="${xOf(i)}" y="${yOf(r.pesoKg) - 6}" text-anchor="middle" font-size="8" fill="var(--text3)">${r.pesoKg}kg</text>`).join('')}
            </svg>
          </div>`;

          // Indicador de tendencia
          const diff = ultimo.pesoKg - penultimo.pesoKg;
          const trendIcon = diff > 0 ? '📈' : diff < 0 ? '📉' : '➡️';
          const trendText = diff > 0 ? `+${diff} kg desde la sesión anterior` : diff < 0 ? `${diff} kg desde la sesión anterior` : 'Mismo peso que la sesión anterior';
          html += `<div class="prog2-trend"><span class="prog2-trend-arrow">${trendIcon}</span><span>${trendText}</span></div>`;
        } else if (registros.length === 1) {
          html += `<div class="prog2-trend" style="color:var(--text3)">⏳ Primera sesión registrada — el gráfico aparecerá con la próxima</div>`;
        }
      }

      html += `</div>`; // cierra prog2-card
    });

    // Ejercicios registrados que no matchearon con el plan (extras de esa sesión)
    const ejsExtra = ejsConDatos.filter(e => !plan.ejercicios.includes(e));
    if (ejsExtra.length > 0) {
      ejsExtra.forEach(ejCanon => {
        const registros = historial[rutina][ejCanon].sort((a,b) => a.fecha.localeCompare(b.fecha));
        html += `<div class="prog2-card" style="border-style:dashed">
          <div class="prog2-name" style="color:var(--text2)">${ejCanon} <span style="font-size:10px;color:var(--text3);font-weight:400">· fuera del plan base</span></div>
          <div class="prog2-sesiones">
            ${registros.map((r,i) => {
              const esUltimo = i === registros.length - 1;
              return `<div class="prog2-chip ${esUltimo ? 'latest' : ''}" title="${r.detalle}">
                <span class="prog2-chip-fecha">${dateLabel(r.fecha).split(' ')[0]}<br>${dateLabel(r.fecha).split(' ')[1]}</span>
                <span class="prog2-chip-peso">${r.peso === '—' ? 'sin carga' : r.peso}</span>
                <span class="prog2-chip-reps">${r.detalle.split('—')[0].trim().substring(0,12)}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });
    }
  });

  document.getElementById('progresion-content').innerHTML = html || '<div class="empty">Sin sesiones registradas todavía</div>';
}

function setProgFiltro(rutina) {
  progFiltroActual = rutina;
  renderProgresion();
}

function changeDay(d){const n=idxN+d;if(n>=0&&n<DAYS_ORDER.length){idxN=n;renderNutricion();}}
function changeDayE(d){const n=idxE+d;if(n>=0&&n<ENTRENO_DAYS.length){idxE=n;renderEntreno();}}
function changeDayB(d){const n=idxB+d;if(n>=0&&n<BIENESTAR_DAYS.length){idxB=n;renderBienestar();}}
function switchTab(id,el){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('panel-'+id).classList.add('active');if(id==='semana')renderSemana();if(id==='progresion')renderProgresion();}

renderNutricion();renderEntreno();renderBienestar();
</script>
