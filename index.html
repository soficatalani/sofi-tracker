<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofi — Tracker Personal</title>
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E2DDD6;
    --text: #1A1A18;
    --text2: #6B6860;
    --text3: #A8A49E;
    --teal: #1D9E75;
    --teal-bg: #E1F5EE;
    --teal-text: #0A5C44;
    --purple: #6B5FD4;
    --purple-bg: #EEEDFE;
    --purple-text: #3C3489;
    --amber: #C97B1A;
    --amber-bg: #FEF3DC;
    --amber-text: #7A4A0A;
    --coral: #C94A2A;
    --coral-bg: #FAECE7;
    --coral-text: #7A2A10;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); }

  /* NAV TABS */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 61px;
    z-index: 99;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    white-space: nowrap;
  }
  .nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .nav-tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  /* PANELS */
  .panel { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .panel.active { display: block; }

  /* DAY NAV */
  .day-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 10px 14px;
    border: 1px solid var(--border);
  }
  .day-nav-btn {
    background: var(--surface2);
    border: none;
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
  }
  .day-nav-btn:active { opacity: .7; }
  .day-nav-label { flex: 1; text-align: center; }
  .day-nav-main { font-size: 15px; font-weight: 600; color: var(--text); }
  .day-nav-tipo { font-size: 11px; margin-top: 1px; }

  /* MACRO GRID */
  .macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .macro-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 12px 8px;
    text-align: center;
  }
  .macro-val { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }
  .macro-unit { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .macro-obj { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .macro-card.over .macro-val { color: var(--coral); }
  .macro-card.perfect .macro-val { color: var(--teal); }
  .macro-card.low .macro-val { color: var(--amber); }

  /* BARS */
  .bars-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .bar-row { margin-bottom: 12px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .bar-track { background: var(--surface2); border-radius: 4px; height: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .bar-teal { background: var(--teal); }
  .bar-amber { background: var(--amber); }
  .bar-coral { background: var(--coral); }
  .bar-purple { background: var(--purple); }

  /* SECTION */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text3);
    margin: 20px 0 8px;
  }

  /* MEAL CARDS */
  .meal-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .meal-time { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text3); }
  .meal-name { font-size: 14px; font-weight: 500; color: var(--text); margin: 3px 0; }
  .meal-macros { font-size: 12px; color: var(--text2); }
  .meal-macros span { margin-right: 10px; }

  /* EX CARDS */
  .ex-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .ex-num {
    background: var(--purple-bg);
    color: var(--purple-text);
    font-size: 12px;
    font-weight: 700;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .ex-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ex-peso {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--teal-text);
    background: var(--teal-bg);
    padding: 2px 7px;
    border-radius: 20px;
    margin-top: 4px;
  }
  .feeling-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .feeling-great { background: var(--teal-bg); color: var(--teal-text); }
  .feeling-ok { background: var(--amber-bg); color: var(--amber-text); }
  .feeling-hard { background: var(--coral-bg); color: var(--coral-text); }

  /* TRANSIT */
  .transit-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .transit-icon { font-size: 24px; }
  .transit-date { font-size: 14px; font-weight: 600; color: var(--text); }
  .transit-time { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .transit-badge {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-ok { background: var(--teal-bg); color: var(--teal-text); }
  .badge-no { background: var(--coral-bg); color: var(--coral-text); }

  /* WEEKLY */
  .weekly-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .weekly-table th { padding: 6px 4px; color: var(--text3); font-weight: 500; text-align: center; font-size: 11px; }
  .weekly-table td { padding: 6px 4px; text-align: center; }
  .weekly-table tr { border-bottom: 1px solid var(--border); }
  .weekly-table tr:last-child { border-bottom: none; }
  .w-lbl { text-align: left !important; font-weight: 500; color: var(--text2); padding-left: 0 !important; }
  .w-dot {
    display: inline-block;
    padding: 2px 5px;
    border-radius: 5px;
    font-weight: 600;
    font-size: 11px;
    min-width: 38px;
  }
  .w-ok { background: var(--teal-bg); color: var(--teal-text); }
  .w-over { background: var(--coral-bg); color: var(--coral-text); }
  .w-low { background: var(--amber-bg); color: var(--amber-text); }
  .w-empty { background: var(--surface2); color: var(--text3); }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .card-body { font-size: 12px; color: var(--text2); line-height: 1.6; }

  .empty { text-align: center; color: var(--text3); font-size: 13px; padding: 32px 0; }

  .tipo-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
  }
  .tipo-gym { background: var(--purple-bg); color: var(--purple-text); }
  .tipo-yoga { background: var(--teal-bg); color: var(--teal-text); }
  .tipo-descanso { background: var(--surface2); color: var(--text2); }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }

  @media (max-width: 360px) {
    .macro-val { font-size: 16px; }
    .macro-grid { gap: 5px; }
  }
</style>
</head>

};

// ── ESTADO ────────────────────────────────────────────────────────────────────
const days = Object.keys(DATA.nutricion).sort();
let idxN = days.length - 1;
let idxE = 0;
const entrenoDays = Object.keys(DATA.entreno).sort();
if (entrenoDays.length) idxE = entrenoDays.length - 1;

function dateLabel(d) {
  const dt = new Date(d + 'T12:00:00');
  return DAYS_ES[dt.getDay()] + ' ' + dt.getDate() + '/' + (dt.getMonth()+1);
}
function tipoLabel(t) {
  return { gym: '🏋️ Día de gym', yoga: '🧘 Día de yoga', descanso: '😴 Día de descanso' }[t] || '';
}
function tipoClass(t) {
  return { gym: 'tipo-gym', yoga: 'tipo-yoga', descanso: 'tipo-descanso' }[t] || '';
}
function goalFor(tipo, macro) {
  const g = { ...GOALS };
  if (tipo === 'yoga') g.kcal = 1700;
  if (tipo === 'descanso') g.kcal = 1600;
  return g[macro];
}
function pct(val, goal) { return Math.min(100, Math.round(val / goal * 100)); }
function barClass(val, goal) {
  const p = val / goal;
  if (p > 1.1) return 'bar-coral';
  if (p > 0.9) return 'bar-teal';
  return 'bar-amber';
}
function macroStatus(val, goal) {
  const p = val / goal;
  if (p > 1.1) return 'over';
  if (p > 0.88) return 'perfect';
  return 'low';
}

// ── RENDER NUTRICIÓN ──────────────────────────────────────────────────────────
function renderNutricion() {
  const d = days[idxN];
  const data = DATA.nutricion[d];
  document.getElementById('dn-label').textContent = dateLabel(d);
  const tipoEl = document.getElementById('dn-tipo');
  tipoEl.innerHTML = `<span class="tipo-badge ${tipoClass(data.tipo)}">${tipoLabel(data.tipo)}</span>`;

  const t = data.totals;
  const macros = [
    { key: 'kcal', lbl: 'kcal', unit: '' },
    { key: 'prot', lbl: 'proteína', unit: 'g' },
    { key: 'carbs', lbl: 'carbos', unit: 'g' },
    { key: 'fat', lbl: 'grasas', unit: 'g' },
  ];

  document.getElementById('macro-grid').innerHTML = macros.map(m => {
    const goal = goalFor(data.tipo, m.key);
    const status = macroStatus(t[m.key], goal);
    return `<div class="macro-card ${status}">
      <div class="macro-val">${t[m.key]}${m.unit}</div>
      <div class="macro-unit">${m.lbl}</div>
      <div class="macro-obj">obj ${goal}${m.unit}</div>
    </div>`;
  }).join('');

  const barLabels = { kcal: 'Calorías', prot: 'Proteína', carbs: 'Carbohidratos', fat: 'Grasas' };
  const barColors = ['bar-teal', 'bar-purple', 'bar-amber', 'bar-coral'];
  document.getElementById('bars').innerHTML = macros.map((m, i) => {
    const goal = goalFor(data.tipo, m.key);
    const p = pct(t[m.key], goal);
    return `<div class="bar-row">
      <div class="bar-meta">
        <span>${barLabels[m.key]}</span>
        <span>${t[m.key]}${m.unit} / ${goal}${m.unit} (${p}%)</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${barColors[i]}" style="width:${p}%"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('meals-list').innerHTML = data.meals.map(m => `
    <div class="meal-card">
      <div class="meal-time">${m.time}</div>
      <div class="meal-name">${m.name}</div>
      ${m.kcal > 0 ? `<div class="meal-macros">
        <span>${m.kcal} kcal</span>
        <span>${m.prot}g prot</span>
        <span>${m.carbs}g carbos</span>
        <span>${m.fat}g grasas</span>
      </div>` : ''}
    </div>
  `).join('');
}

// ── RENDER ENTRENO ────────────────────────────────────────────────────────────
function renderEntreno() {
  const d = entrenoDays[idxE];
  document.getElementById('dn-label-e').textContent = dateLabel(d);
  const data = DATA.entreno[d];
  if (!data) { document.getElementById('entreno-content').innerHTML = '<div class="empty">Sin entrenamiento registrado</div>'; return; }
  const fc = { great: 'feeling-great', ok: 'feeling-ok', hard: 'feeling-hard' };
  const fl = { great: '✅ Muy bien', ok: '⚠️ Regular', hard: '❌ Difícil' };
  document.getElementById('entreno-content').innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px">
        <div>
          <div class="card-title" style="font-size:16px">${data.tipo}</div>
          <div style="font-size:12px;color:var(--text3)">${data.duracion}</div>
        </div>
        <span class="feeling-badge ${fc[data.feeling]}">${fl[data.feeling]} — ${data.feelingText}</span>
      </div>
    </div>
    ${data.ejercicios.map((e, i) => `
      <div class="ex-card">
        <div class="ex-num">${i + 1}</div>
        <div>
          <div class="ex-name">${e.name}</div>
          <div class="ex-detail">${e.detalle}</div>
          <span class="ex-peso">${e.peso}</span>
        </div>
      </div>
    `).join('')}
  `;
}

// ── RENDER TRÁNSITO ───────────────────────────────────────────────────────────
function renderTransito() {
  const list = document.getElementById('transit-list');
  if (!DATA.transito.length) { list.innerHTML = '<div class="empty">Sin registros todavía</div>'; return; }
  list.innerHTML = DATA.transito.slice().reverse().map(t => `
    <div class="transit-card">
      <div class="transit-icon">${t.hora ? '✅' : '❌'}</div>
      <div class="transit-info">
        <div class="transit-date">${dateLabel(t.fecha)}</div>
        <div class="transit-time">${t.hora ? 'Hora: ' + t.hora : 'No fue'} ${t.nota ? '— ' + t.nota : ''}</div>
      </div>
      <span class="transit-badge ${t.hora ? 'badge-ok' : 'badge-no'}">${t.hora ? 'Sí' : 'No'}</span>
    </div>
  `).join('');
}

// ── RENDER SEMANA ─────────────────────────────────────────────────────────────
function renderSemana() {
  const weekDays = days;
  const macroKeys = [
    { key: 'kcal', lbl: 'Kcal', unit: '' },
    { key: 'prot', lbl: 'Prot', unit: 'g' },
    { key: 'carbs', lbl: 'Carbos', unit: 'g' },
    { key: 'fat', lbl: 'Grasas', unit: 'g' },
  ];

  let th = '<tr><th class="w-lbl">Macro</th>' + weekDays.map(d => `<th>${dateLabel(d)}</th>`).join('') + '</tr>';
  let rows = macroKeys.map(m => {
    const cells = weekDays.map(d => {
      const dd = DATA.nutricion[d];
      if (!dd) return '<td><span class="w-dot w-empty">—</span></td>';
      const val = dd.totals[m.key];
      const goal = goalFor(dd.tipo, m.key);
      const p = val / goal;
      const cls = p > 1.1 ? 'w-over' : p > 0.88 ? 'w-ok' : 'w-low';
      return `<td><span class="w-dot ${cls}">${val}${m.unit}</span></td>`;
    }).join('');
    return `<tr><td class="w-lbl">${m.lbl}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('weekly-table').innerHTML = th + rows;

  const entDiv = document.getElementById('weekly-entreno');
  const entRows = Object.entries(DATA.entreno).map(([d, e]) =>
    `<div class="summary-row">
      <span>${dateLabel(d)}</span>
      <span style="font-weight:600">${e.tipo}</span>
      <span style="color:var(--text3)">${e.duracion}</span>
    </div>`
  ).join('');
  entDiv.innerHTML = entRows || '<div class="empty">Sin datos</div>';

  const trDiv = document.getElementById('weekly-transito');
  const trRows = DATA.transito.map(t =>
    `<div class="summary-row">
      <span>${dateLabel(t.fecha)}</span>
      <span style="color:${t.hora ? 'var(--teal)' : 'var(--coral)'}; font-weight:600">${t.hora || 'No fue'}</span>
      ${t.nota ? `<span style="color:var(--text3);font-size:12px">${t.nota}</span>` : ''}
    </div>`
  ).join('');
  trDiv.innerHTML = trRows || '<div class="empty">Sin datos</div>';
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function changeDay(delta) {
  const next = idxN + delta;
  if (next >= 0 && next < days.length) { idxN = next; renderNutricion(); }
}
function changeDayE(delta) {
  const next = idxE + delta;
  if (next >= 0 && next < entrenoDays.length) { idxE = next; renderEntreno(); }
}
function switchTab(id, el) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
  if (id === 'semana') renderSemana();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderNutricion();
renderEntreno();
renderTransito();
</script>
</body>
</html>
